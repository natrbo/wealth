<html lang="th">
<head>

<link rel="manifest" href="manifest.json">

<style>
  :root {
    --bg-app: #09090b;          /* Zinc-950 */
    --bg-card: #18181b;         /* Zinc-900 */
    --bg-sidebar: #09090b;      /* Zinc-950 */
    --bg-input: #27272a;        /* Zinc-800 */
    --border: #27272a;          /* Zinc-800 */
    --line: var(--border);
    --bg-active-tab: rgba(251, 191, 36, 0.08); /* Muted gold active tab background */
    --text-primary: #fafafa;    /* Zinc-50 */
    --text-secondary: #a1a1aa;  /* Zinc-400 */
    --accent-gold: #fbbf24;     /* Premium Gold (Amber-400) */
    --accent-gold-rgb: 251, 191, 36;
    --accent-gold2: #f59e0b;    /* Gold darker (Amber-500) */
    --accent-green: #10b981;    /* Emerald-500 */
    --accent-red: #ef4444;      /* Red-500 */
    --accent-blue: #3b82f6;     /* Blue-500 */
    --tech: #06b6d4;
    --shadow-soft: 0 10px 30px -10px rgba(0, 0, 0, 0.5), 0 1px 3px 0 rgba(0, 0, 0, 0.2);

    /* Legacy CSS Variable Aliases used by lib/render.js */
    --text: var(--text-primary);
    --mute: var(--text-secondary);
    --gold: var(--accent-gold);
    --gold2: var(--accent-gold2);
    --green: var(--accent-green);
    --red: var(--accent-red);
    --blue: var(--accent-blue);
    --ink: #09090b;
    --ink2: #18181b;
    --ink3: #27272a;
  }
  
  body.light {
    --bg-app: #fafafa;          /* Zinc-50 */
    --bg-card: #ffffff;         /* White card container */
    --bg-sidebar: #ffffff;      /* White sidebar container */
    --bg-input: #f4f4f5;        /* Zinc-100 */
    --border: #e4e4e7;          /* Zinc-200 */
    --line: var(--border);
    --bg-active-tab: #eff6ff;   /* Soft blue active tab background */
    --text-primary: #09090b;    /* Zinc-950 */
    --text-secondary: #71717a;  /* Zinc-500 */
    --accent-gold: #d97706;     /* Amber-600 */
    --accent-gold-rgb: 217, 119, 6;
    --accent-gold2: #b45309;    /* Amber-700 */
    --accent-green: #059669;    /* Emerald-600 */
    --accent-red: #dc2626;      /* Red-600 */
    --accent-blue: #4f46e5;     /* Indigo-600 */
    --tech: #0891b2;
    --shadow-soft: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);

    /* Legacy CSS Variable Aliases used by lib/render.js */
    --text: var(--text-primary);
    --mute: var(--text-secondary);
    --gold: var(--accent-gold);
    --gold2: var(--accent-gold2);
    --green: var(--accent-green);
    --red: var(--accent-red);
    --blue: var(--accent-blue);
    --ink: #ffffff;
    --ink2: #fafafa;
    --ink3: #f4f4f5;
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  body{
    background:var(--bg-app);
    color:var(--text-primary);
    font-family:'Inter','Sarabun',system-ui,sans-serif;
    font-size:14px;
    min-height:100vh;
    transition:background .3s, color .3s;
  }
  
  input{font-family:inherit}
  input[type=text]{-moz-appearance:textfield}
  
  /* Layout Structures */
  .app-container {
    display: flex;
    min-height: 100vh;
    width: 100%;
  }

  .sidebar {
    width: 280px;
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 30px 24px;
    position: fixed;
    top: 0;
    bottom: 0;
    left: 0;
    z-index: 100;
    transition: background 0.3s, border-color 0.3s;
  }

  .sidebar-brand {
    margin-bottom: 24px;
  }
  .sidebar-brand h1 {
    font-size: 20px;
    font-weight: 800;
    color: var(--text-primary);
    margin-top: 2px;
    letter-spacing: -0.5px;
  }

  .sidebar-total {
    background: var(--bg-input);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 20px;

  }

    gap: 12px;

    border: none;

    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;

    text-align: left;

    width: 100%;

  }
  .sidebar-nav .tab-btn svg {

  }
  .sidebar-nav .tab-btn:hover {

  .rowh {
    display: flex;
    justify-content: space-between;
    align-items: center;

  }
  
  /* Modern Progress Bar */
  .track {
    position: relative;
    height: 10px;
    background: var(--bg-input);
    border-radius: 6px;
    overflow: hidden;
    transition: background 0.3s;

    padding: 8px 12px;

    border-color: var(--accent-blue);

    background: rgba(245, 158, 11, 0.08);

    border-radius: 8px;
    padding: 12px 16px;

    border-left-color: var(--accent-red);

  body.light .alert.warn {
    background: #FFF5F5;

  .toast {
    position: fixed;

    left: 50%;
    transform: translateX(-50%);

    color: var(--accent-green);

    box-shadow: 0 8px 30px rgba(0,0,0,0.15);

  .muted { color: var(--text-secondary); } 
  .green { color: var(--accent-green); } 
  .red { color: var(--accent-red); } 
  .gold { color: var(--accent-gold); }
  .tnum { font-variant-numeric: tabular-nums; }
  
  .acc {
    width: 100%;
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    justify-content: space-between;

  .center { display: grid; place-items: center; min-height: 60vh; gap: 14px; }

  /* Bracket thermometer bar */
  .thermo-bar {
    position: relative;
    height: 24px;

  .thermo-fill {

  .thermo-label {

  .tog-track {

<body>
<div class="wrap" id="app">
  <div class="center"><span class="spin"></span><span class="muted" style="letter-spacing:3px;font-size:12px">กำลังโหลด…</span></div>
</div>

<!-- pure logic (single source of truth) — โหลดก่อน main script -->
<script src="lib/logic.js"></script>
<!-- ค่าคงที่, asset classes, SEED — แก้กองทุนที่นี่ -->
<script src="lib/config.js"></script>
<!-- render functions — tabOverview, tabDCA, tabTax, etc. -->
<script src="lib/render.js"></script>
<!-- net worth module — global sheets + dashboard (Phase 1) -->
<script src="lib/networth.js?v=2a"></script>
<script>
// ── State ──
let STATE = { profile:"fern", assets:[], tax:{}, snapshots:[], tab:"overview", editing:false, accOpen:{}, _addForm:null, _dcaAddForm:null, _dcaMonths:12, _pvdMonthly:0 };

const $ = (sel,el=document)=>el.querySelector(sel);
// num, baht, remainingMonths, bracketInfo, calcTax → lib/logic.js

function derivedTax(){
  const t=STATE.tax, future=remainingMonths();
  const rmfMonthly=STATE.assets.filter(a=>a.bucket==="RMF"&&(+a.plan>0)).reduce((s,a)=>s+(+a.plan||0),0);
  const esgAsset=STATE.assets.find(a=>/esg/i.test(a.id)||/ThaiESG/i.test(a.name));
  const esgMonthly=esgAsset?(+esgAsset.plan||0):0;
  const rmfBought=(+t.rmfBought||0), esgBought=(+t.esgBought||0);
  return {...t,
    rmf:rmfBought+rmfMonthly*future,        // ลดหย่อนปีนี้ = ซื้อแล้ว + ครึ่งหลัง
    thaiesg:esgBought+esgMonthly*future,
    _future:future, _rmfMonthly:rmfMonthly, _esgMonthly:esgMonthly,
    _rmfBought:rmfBought, _esgBought:esgBought};
}

// ── API ──
async function apiLoad(profile){
  const r=await fetch(`${API_URL}?profile=${profile}`);
  const j=await r.json();
  if(!j.ok) throw new Error(j.error||"load failed");
  return j.data;
}
async function apiSave(sheet,profile,rows){
  const r=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},
    body:JSON.stringify({sheet,profile,rows})});
  const j=await r.json().catch(()=>({}));
  if(j.ok===false) throw new Error(j.error||"save failed");
  if(typeof _profileCache!=="undefined") delete _profileCache[profile]; // cache เก่า — ให้สลับครั้งหน้าโหลดสด
}

function toast(msg,color="var(--green)"){
  const t=document.createElement("div"); t.className="toast"; t.textContent=msg;
  t.style.borderColor=color; t.style.color=color; document.body.appendChild(t);
  setTimeout(()=>t.remove(),2000);
}

// ── load profile data ──
const _profileCache={}; // profile -> raw data ล่าสุด (สลับชื่อแบบทันที)

// แปลง data จาก backend → STATE (assets/tax/snapshots)
function applyProfileData(data){
  if(data.assets && data.assets.length){
    STATE.assets = data.assets.map(a=>({...a,value:+a.value||0,plan:+a.plan||0}));
    STATE._pvdMonthly = STATE.assets.filter(a=>a.bucket==='PVD').reduce((s,a)=>s+(+a.plan||0),0);
    // pvd_pct ไม่ถูก save โดย Apps Script — derive กลับจาก plan amounts
    if(STATE._pvdMonthly>0){
      STATE.assets=STATE.assets.map(a=>
        a.bucket==='PVD'&&!(+a.pvd_pct)
          ?{...a,pvd_pct:Math.round((+a.plan||0)/STATE._pvdMonthly*100)}
          :a
      );
    }
  } else {
    STATE.assets = []; STATE._pvdMonthly = 0; // ว่าง — ให้กดโหลด seed
  }
  // backend อาจคืน tax เป็น array [{...}] (เก่า) หรือ object {...} (JSON-store ใหม่) — รองรับทั้งคู่
  const taxRow = Array.isArray(data.tax) ? data.tax[0] : data.tax;
  STATE.tax = (taxRow && Object.keys(taxRow).length) ? coerceTax(taxRow) : STATE.tax;
  STATE.snapshots = (data.snapshots||[]).map(s=>({...s,total:+s.total||0,
    breakdown: typeof s.breakdown==="string"?safeParse(s.breakdown):(s.breakdown||{})}));
}

// กำลังแก้ไข/มี save ค้าง ไหม — ถ้าใช่ ห้าม background refresh ทับ
function _profileBusy(){
  return STATE.editing || STATE._dirty || STATE._addForm || STATE._dcaAddForm
    || !!setPlan._t || !!_taxTimer;
}

async function loadProfile(profile){
  STATE.profile=profile;
  STATE._error=null;
  const cached=_profileCache[profile];
  if(cached){
    applyProfileData(cached);
    render();                 // ทันที — ไม่มีสปินเนอร์
    refreshProfile(profile);  // แล้วดึงของจริงเงียบ ๆ เบื้องหลัง
    return;
  }
  render(true); // ครั้งแรกของคนนี้ — โชว์ loading
  try{
    const data = await apiLoad(profile);
    _profileCache[profile]=data;
    applyProfileData(data);
  }catch(e){
    STATE._error = String(e);
  }
  render();
}

// ดึงข้อมูลล่าสุดเบื้องหลัง — อัปเดต cache เสมอ, render เฉพาะเมื่อยังอยู่คนเดิมและไม่ได้กำลังแก้
async function refreshProfile(profile){
  try{
    const data = await apiLoad(profile);
    _profileCache[profile]=data;
    if(STATE.profile===profile && !_profileBusy()){
      applyProfileData(data);
      render();
    }
  }catch(e){ /* เงียบ — ใช้ cache ต่อไป */ }
}

async function syncSeedPlans(){

  const seedAssets=(SEED[STATE.profile]?.assets||[]);

// คำนวณยอด PVD ใหม่จาก % + อัปเดต DOM สด ๆ (ไม่ autosave — กดบันทึกเอง)
function recalcPvd(){
  const tot=+STATE._pvdMonthly||0;
  let pctSum=0;
  STATE.assets.forEach(a=>{
    if(a.bucket!=='PVD')return;
    a.plan=Math.round(tot*(+a.pvd_pct||0)/100);
    pctSum+=(+a.pvd_pct||0);
    const cell=document.getElementById('pvd-amt-'+a.id);
    if(cell)cell.textContent=baht(a.plan);
  });
  const ok=Math.abs(pctSum-100)<0.05, pctShow=+pctSum.toFixed(1), pctGap=+Math.abs(100-pctSum).toFixed(1);
  const sumEl=document.getElementById('pvd-sum');
  if(sumEl){
    sumEl.textContent=ok?`รวม ${pctShow}% ✓`
      :`รวม ${pctShow}% — ${pctSum<100?'ขาดอีก '+pctGap:'เกินมา '+pctGap}% (ต้องรวมเป็น 100)`;
    sumEl.style.color=ok?'var(--green)':'var(--red)';
  }
  const btn=document.getElementById('pvd-save-btn');
  if(btn){btn.disabled=!ok;btn.style.opacity=ok?'1':'.45';btn.style.cursor=ok?'pointer':'not-allowed';}
  renderDcaImpact();
}
function setPvdTotal(v){ STATE._pvdMonthly=num(v); recalcPvd(); }

  const a=STATE.assets.find(x=>x.id===id); if(a)a.pvd_pct=num(v);

function setTaxLive(k,v){

  if(inp&&inp!==active) inp.value=n||0;

function _applyTaxChange(k,n){
  // Capture state before the first keystroke of a new debounce cycle
  if(!_taxTimer) _taxSaveSnap=snapState();
  STATE.tax[k]=n;
  const dt=derivedTax();
  const inc=+dt.income||0;
  // Dynamic slider maxes
  const rmfSli=document.getElementById('tax-slider-rmfBought');
  const esgSli=document.getElementById('tax-slider-esgBought');
  if(rmfSli){const mx=Math.floor(Math.min(inc*.30,500000)/1000)*1000;rmfSli.max=mx;}
  if(esgSli){const mx=Math.floor(Math.min(inc*.30,300000)/1000)*1000;esgSli.max=mx;}
  updateTaxSummary(calcTax(dt));
  clearTimeout(_taxTimer);
  _taxTimer=setTimeout(async()=>{
    _taxTimer=null;
    const snap=_taxSaveSnap; _taxSaveSnap=null;
    const btns=document.querySelectorAll('[onclick="saveTax()"]');
    btns.forEach(b=>btnLoading(b,true));
    try{await apiSave("tax",STATE.profile,[STATE.tax]);toast("บันทึกภาษีแล้ว ✓");}
    catch(e){rollback(snap);toast("บันทึกไม่สำเร็จ — ย้อนกลับแล้ว","var(--red)");}
    finally{btns.forEach(b=>btnLoading(b,false));}
  },1500);
}

  h1{font-size:20px;margin-bottom:4px}h2{font-size:14px;margin:20px 0 8px;border-bottom:2px solid #e0c97f;padding-bottom:4px;color:#5a4000}
  table{width:100%;border-collapse:collapse;margin-bottom:8px}
  th{background:#f5f0e0;text-align:left;padding:6px 8px;font-size:11px;border:1px solid #ddd}
  td{padding:5px 8px;border:1px solid #eee;vertical-align:top}
  tr:nth-child(even){background:#fafaf5}
  .meta{color:#666;font-size:12px;margin-bottom:16px}
  .total{font-size:24px;font-weight:700;color:#5a4000}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
  @media print{body{margin:16px}}
</style></head><body>
<h1>Portfolio Report — ${name}</h1>
<div class="meta">${dateStr} · มูลค่ารวม: <span class="total">${baht(t)}</span></div>
<div class="grid">
<div>
<h2>Asset Allocation (ปัจจุบัน vs เป้า)</h2>
<table><tr><th>ประเภท</th><th>มูลค่า</th><th>จริง</th><th>เป้า</th><th>ต่าง</th></tr>${allocRows}</table>
</div>
<div>
<h2>Projection +${months} เดือน</h2>
<table><tr><th>ประเภท</th><th>ตอนนี้</th><th>+${months}ด.</th><th>เป้า</th><th>ต่าง</th></tr>${projRows}</table>
</div>
</div>
<h2>แผน DCA กองทุน (${baht(dcaTotal)}/เดือน)</h2>
<table><tr><th>กองทุน</th><th>ประเภท</th><th>บาท/เดือน</th></tr>${dcaRows}</table>
${pvdA.length?`<h2>PVD สมทบ (${baht(pvdTotal)}/เดือน)</h2>
<table><tr><th>กอง</th><th>ประเภท</th><th>%</th><th>บาท/เดือน</th></tr>${pvdRows}</table>`:''}
</body></html>`;
  const w=window.open('','_blank');
  w.document.write(html);
  w.document.close();
  w.onload=()=>w.print();
}
function toggleTheme(){
  document.body.classList.toggle('light');
  localStorage.setItem('theme', document.body.classList.contains('light')?'light':'dark');
}
function toggleEdit(){STATE.editing=true;STATE._dirty=false;render();}
function setVal(id,v){const a=STATE.assets.find(x=>x.id===id);if(a){a.value=num(v);STATE._dirty=true;}
  const t=total();
  const tot=document.querySelector("header .total");if(tot)tot.textContent=baht(t);
  const tot2=document.getElementById("update-total");if(tot2)tot2.textContent=baht(t);}
let _taxTimer=null;
function setTax(k,v){ _applyTaxChange(k,num(v)); }
function setTaxAndReload(k,v){
  const inp=document.getElementById('tax-input-'+k);
  if(inp) inp.value=v;
  _applyTaxChange(k,v);
  renderTab();
}
function addTaxAndReload(k,amt){
  const cur=STATE.tax[k]||0;
  const n=cur+amt;
  const inp=document.getElementById('tax-input-'+k);
  if(inp) inp.value=n;
  _applyTaxChange(k,n);
  renderTab();
}
function recomputeTax(){renderTab();} // กดปุ่มเพื่อคำนวณใหม่
function toggleTaxBool(k){STATE.tax[k]=+STATE.tax[k]?0:1;renderTab();}
function toggleAcc(k){STATE.accOpen[k]=!STATE.accOpen[k];renderTab();}

// ── Button loading helper ──
function btnLoading(el,on){
  if(!el)return;
  if(on){el.disabled=true;el._txt=el.textContent;el.innerHTML=`<span class="spin" style="display:inline-block;width:12px;height:12px;border-width:2px;vertical-align:middle"></span>`;}
  else{el.disabled=false;if(el._txt!==undefined)el.textContent=el._txt;}
}

async function saveAll(){
  const rollSnap=snapState();
  const btn=document.querySelector('[onclick="saveAll()"]');
  btnLoading(btn,true);
  STATE.editing=false;
  STATE._dirty=false;
  try{
    await apiSave("assets",STATE.profile,STATE.assets);
    const mk=()=>{const d=new Date();const th=["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];return th[d.getMonth()]+" "+((d.getFullYear()+543)%100);};
    const bc=byClass();const sn={month:mk(),total:total(),breakdown:JSON.stringify(bc)};
    STATE.snapshots=[...STATE.snapshots.filter(s=>s.month!==sn.month),sn];
    await apiSave("snapshots",STATE.profile,STATE.snapshots);
    toast("บันทึกแล้ว ✓");
  }catch(e){
    rollback(rollSnap);
    STATE.editing=true;
    toast("บันทึกไม่สำเร็จ — ย้อนกลับแล้ว","var(--red)");
  }finally{btnLoading(btn,false);}
  render();
}
async function saveTax(){
  const rollSnap=snapState();
  const btns=document.querySelectorAll('[onclick="saveTax()"]');
  btns.forEach(b=>btnLoading(b,true));
  try{await apiSave("tax",STATE.profile,[STATE.tax]);toast("บันทึกภาษีแล้ว ✓");}
  catch(e){rollback(rollSnap);toast("บันทึกไม่สำเร็จ — ย้อนกลับแล้ว","var(--red)");}
  finally{btns.forEach(b=>btnLoading(b,false));}
}

// ── State snapshot / rollback ──
function snapState(){
  return {
    assets:   STATE.assets.map(a=>({...a})),
    tax:      {...STATE.tax},
    snapshots:STATE.snapshots.map(s=>({...s})),
  };
}
function rollback(snap){
  STATE.assets=snap.assets;
  STATE.tax=snap.tax;
  STATE.snapshots=snap.snapshots;
  render();
}

// ── init ──
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
if(API_URL==="PASTE_YOUR_APPS_SCRIPT_URL_HERE"){
  $("#app").innerHTML=`<div class="center"><div class="card" style="max-width:420px"><div class="gold" style="font-size:15px;margin-bottom:10px">⚙️ ยังไม่ได้ตั้งค่า</div><div class="muted" style="font-size:13px;line-height:1.7">เปิดไฟล์นี้แก้บรรทัด <span class="gold">API_URL</span> ด้านบนสุดของ &lt;script&gt; ให้เป็น URL ของ Apps Script Web App (จาก Phase 1) แล้วเซฟ เปิดใหม่อีกครั้ง</div></div></div>`;
}else{
  loadProfile("fern");
}
</script>
</body>
</html>
