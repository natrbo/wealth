<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Wealth Ledger</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#C8A35B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Wealth">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0E1726; --ink2:#16223A; --ink3:#0B1322; --line:#26344F; --text:#E8EDF5;
    --mute:#8A99B5; --gold:#C8A35B; --gold2:#E4CF9B; --green:#5FB98E; --red:#D8745F;
    --tech:#4DD0C7;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  body{
    background:radial-gradient(1200px 600px at 50% -10%, #1A2740, var(--ink));
    color:var(--text); font-family:'Sarabun','Inter',system-ui,sans-serif;
    font-size:15px; min-height:100vh; transition:background .3s, color .3s;
  }
  input{font-family:inherit}
  input[type=text]{-moz-appearance:textfield}
  .wrap{width:100%;margin:0 auto;padding-bottom:60px}
  header{display:flex;justify-content:space-between;align-items:flex-end;padding:26px 20px 14px}
  .eyebrow{color:var(--gold);font-size:10px;letter-spacing:4px;font-weight:600}
  h1{font-family:Georgia,serif;font-size:24px;font-weight:700;margin-top:4px}
  .total{color:var(--gold);font-size:24px;font-weight:700;line-height:1.1;font-variant-numeric:tabular-nums}
  .sub{color:var(--mute);font-size:11px}
  .profiles{display:flex;gap:8px;padding:0 16px 12px}
  .pf{flex:1;background:none;border:1px solid var(--line);color:var(--mute);border-radius:10px;
    padding:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
  .pf.on{background:linear-gradient(135deg,var(--gold2),var(--gold));color:var(--ink);border-color:transparent}
  nav{display:flex;gap:4px;padding:0 12px;border-bottom:1px solid var(--line);overflow-x:auto}
  .tab{background:none;border:none;color:var(--mute);padding:12px 11px 13px;font-size:13px;
    cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;font-family:inherit}
  .tab.on{color:var(--gold);border-bottom-color:var(--gold);font-weight:600}
  main{padding:16px}
  .card{background:var(--ink2);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:14px}
  .ctitle{color:var(--gold2);font-size:11px;letter-spacing:2px;font-weight:600;
    margin-bottom:16px;text-transform:uppercase}
  .rowh{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
  .track{position:relative;height:8px;background:var(--ink3);border-radius:6px;overflow:hidden}
  .fill{position:absolute;left:0;top:0;bottom:0;border-radius:6px;transition:width .5s}
  .tick{position:absolute;top:-2px;bottom:-2px;width:2px;background:var(--text);opacity:.55}
  .ceil{position:absolute;top:-2px;bottom:-2px;width:2px;background:var(--red)}
  .arow{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-top:1px solid var(--line)}
  .brow{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-top:1px solid var(--line)}
  input.num{background:var(--ink3);border:1px solid var(--line);color:var(--gold);border-radius:8px;
    padding:8px 10px;width:128px;text-align:right;font-size:14px;font-variant-numeric:tabular-nums;outline:none}
  .btn{background:linear-gradient(135deg,var(--gold2),var(--gold));color:var(--ink);border:none;
    border-radius:9px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
  .dot{width:9px;height:9px;border-radius:2px;display:inline-block;margin-right:8px;vertical-align:middle}
  .alert{background:var(--ink2);border-left:3px solid var(--gold);border-radius:8px;
    padding:11px 14px;font-size:13px;line-height:1.4;margin-bottom:8px}
  .alert.warn{border-left-color:var(--red)}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink2);
    border:1px solid var(--green);color:var(--green);padding:10px 20px;border-radius:10px;font-size:13px;z-index:99}
  .muted{color:var(--mute)} .green{color:var(--green)} .red{color:var(--red)} .gold{color:var(--gold)}
  .tnum{font-variant-numeric:tabular-nums}
  .acc{width:100%;background:none;border:none;cursor:pointer;display:flex;justify-content:space-between;
    align-items:center;padding:13px 0;border-top:1px solid var(--line);font-family:inherit;color:var(--text)}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--gold);
    border-radius:50%;animation:sp 0.7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .center{display:grid;place-items:center;min-height:60vh;gap:14px}
  .g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .g2 .full{grid-column:1/-1}
  .mini-card{background:var(--ink3);border-radius:12px;padding:14px}

  /* ── Light theme — Fintech Clean (inspired by Finomena / iTAX) ── */
  body.light{
    --ink:  #F5F7FB;   /* warm off-white · page bg     */
    --ink2: #FFFFFF;   /* pure white · card surface    */
    --ink3: #EEF1F8;   /* input / mini-card bg         */
    --line: #DDE3EF;   /* subtle border                */
    --text: #1A2540;   /* deep navy · primary text     */
    --mute: #6B7A99;   /* mid-blue-grey · secondary    */
    --gold: #C8960C;   /* true coin-gold · money values */
    --gold2:#9A6F00;   /* deep gold · ctitle           */
    --green:#0C8A4E;   /* rich green · gains           */
    --red:  #D93025;   /* clear red · losses           */
    --tech: #1D6FD8;   /* fintech blue · tech/em       */
    background:linear-gradient(160deg,#F5F7FB 0%,#EBEEf7 100%);
    color:var(--text);
  }

  /* ── cards & surfaces ── */
  body.light .card{
    background:#fff;
    border:1px solid #DDE3EF;
    box-shadow:0 2px 8px rgba(20,35,80,.05), 0 12px 40px rgba(20,35,80,.06);
  }
  body.light .mini-card{
    background:#F5F7FB;
    border:1px solid #DDE3EF;
    box-shadow:none;
  }

  /* ── inputs & sliders ── */
  body.light input.num{
    background:#EEF1F8;
    color:#1A2540;
    border-color:#DDE3EF;
    font-weight:600;
  }
  body.light input.num:focus{border-color:#1D6FD8;box-shadow:0 0 0 3px rgba(29,111,216,.12)}
  body.light select{
    background:#EEF1F8!important;
    color:#1A2540!important;
    border-color:#DDE3EF!important;
  }
  body.light input[type=range]{
    background:linear-gradient(90deg,#C8960C 0%,#C8960C var(--pct,50%),#DDE3EF var(--pct,50%));
    accent-color:#C8960C;
  }
  body.light input[type=range]::-webkit-slider-thumb{
    background:#C8960C;
    box-shadow:0 1px 4px rgba(200,150,12,.40);
  }
  body.light input[type=range]::-moz-range-thumb{
    background:#C8960C;
    box-shadow:0 1px 4px rgba(200,150,12,.40);
  }

  /* ── nav & tabs ── */
  body.light nav{
    background:#fff;
    border-bottom:1px solid #DDE3EF;
    box-shadow:0 1px 6px rgba(20,35,80,.04);
  }
  body.light .tab{color:var(--mute);font-weight:500}
  body.light .tab.on{color:#1D6FD8;border-bottom-color:#1D6FD8;font-weight:600}

  /* ── profile buttons ── */
  body.light .pf{border-color:#DDE3EF;color:var(--mute);background:#fff}
  body.light .pf:hover{border-color:#1D6FD8;color:#1D6FD8}
  body.light .pf.on{
    background:#1D6FD8;
    color:#fff;border-color:transparent;
    box-shadow:0 4px 14px rgba(29,111,216,.30);
  }

  /* ── primary button ── */
  body.light .btn{
    background:#1D6FD8;
    color:#fff;
    box-shadow:0 4px 12px rgba(29,111,216,.30);
  }
  body.light .btn:hover{background:#1557B8;box-shadow:0 6px 18px rgba(29,111,216,.40)}

  /* ── accordion & rows ── */
  body.light .acc{color:var(--text);border-top-color:#DDE3EF}
  body.light .arow{border-top-color:#DDE3EF}
  body.light .brow{border-top-color:#DDE3EF}

  /* ── alerts ── */
  body.light .alert{
    background:#FFFDF0;
    border-left-color:#C8960C;
    box-shadow:0 1px 4px rgba(200,150,12,.08);
  }
  body.light .alert.warn{
    background:#FFF5F5;
    border-left-color:#D93025;
    box-shadow:0 1px 4px rgba(217,48,37,.06);
  }

  /* ── toast ── */
  body.light .toast{
    background:#fff;
    border-color:#0C8A4E;
    color:#0C8A4E;
    box-shadow:0 8px 32px rgba(20,35,80,.12);
  }

  /* ── eyebrow / headings ── */
  body.light .eyebrow{color:#9A6F00}
  body.light .ctitle{color:#6B7A99;letter-spacing:1.2px;font-weight:600}
  body.light h1{color:var(--text)}

  /* ── thermometer bar ── */
  body.light .thermo-bar{background:#DDE3EF}

  /* ── Theme toggle slider ── */
  .theme-toggle{display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none}
  .theme-toggle span{font-size:14px;line-height:1}
  .tog-track{
    width:44px;height:24px;border-radius:12px;
    background:var(--line);border:1px solid var(--line);
    position:relative;transition:background .25s;flex-shrink:0;cursor:pointer;
  }
  body.light .tog-track{background:#C8A35B}
  .tog-thumb{
    position:absolute;top:3px;left:3px;
    width:16px;height:16px;border-radius:50%;
    background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.3);
    transition:transform .25s;
  }
  body.light .tog-thumb{transform:translateX(20px)}

  /* ── Responsive breakpoints ── */
  @media(min-width:768px){
    .wrap{max-width:1200px;padding-bottom:40px}
    header{padding:28px 32px 16px}
    .profiles{padding:0 26px 14px}
    nav{padding:0 26px}
    main{padding:20px 32px}

    /* Overview: left panel | right 4-col asset grid */
    .dash-overview{display:grid;grid-template-columns:280px 1fr;gap:18px;align-items:start}
    .ov-left{display:flex;flex-direction:column;gap:14px}
    .ov-right{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;align-content:start}

    /* Tax: 3 columns */
    .dash-tax{display:grid;grid-template-columns:1fr 1.05fr 0.95fr;gap:18px;align-items:start}
    .tax-col{display:flex;flex-direction:column;gap:14px}
    .tax-col .card{margin-bottom:0}
    .tax-col .mini-card{margin-bottom:0}
  }
  /* ── Range slider (iTAX-style) ── */
  input[type=range]{
    -webkit-appearance:none;appearance:none;
    height:6px;background:var(--ink3);border-radius:3px;
    outline:none;cursor:pointer;border:none;padding:0;width:100%;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;width:20px;height:20px;border-radius:50%;
    background:linear-gradient(135deg,var(--gold2),var(--gold));
    cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.35);border:none;
  }
  input[type=range]::-moz-range-thumb{
    width:20px;height:20px;border-radius:50%;
    background:linear-gradient(135deg,var(--gold2),var(--gold));
    cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.35);border:none;
  }
  input[type=range]::-webkit-slider-runnable-track{border-radius:3px}
  body.light input[type=range]{background:var(--line)}
  /* Bracket thermometer bar */
  .thermo-bar{position:relative;height:22px;background:var(--ink3);border-radius:11px;overflow:hidden}
  .thermo-fill{position:absolute;left:0;top:0;bottom:0;border-radius:11px;transition:width .22s ease}
  .thermo-label{position:absolute;inset:0;display:flex;align-items:center;padding:0 10px;pointer-events:none}
  body.light .thermo-bar{background:var(--ink3)}

  @media(min-width:1200px){
    .wrap{max-width:100%}
    .dash-overview{grid-template-columns:340px 1fr}
    .dash-tax{grid-template-columns:1fr 1.1fr 0.9fr;gap:22px}
  }
</style>
<script>
  /* Anti-FOUC: apply saved theme before paint */
  if(localStorage.getItem('theme')==='light') document.body.classList.add('light');
</script>
</head>
<body>
<div class="wrap" id="app">
  <div class="center"><span class="spin"></span><span class="muted" style="letter-spacing:3px;font-size:12px">กำลังโหลด…</span></div>
</div>

<!-- pure logic (single source of truth) — โหลดก่อน main script -->
<script src="lib/logic.js"></script>
<!-- ค่าคงที่, asset classes, SEED — แก้กองทุนที่นี่ -->
<script src="lib/config.js"></script>
<!-- render functions — tabOverview, tabDCA, tabTax, etc. -->
<script src="lib/render.js"></script>
<script>
// ── State ──
let STATE = { profile:"fern", assets:[], tax:{}, snapshots:[], tab:"overview", editing:false, accOpen:{}, _addForm:null, _dcaAddForm:null, _dcaMonths:12, _pvdMonthly:0 };

const $ = (sel,el=document)=>el.querySelector(sel);
// num, baht, remainingMonths, bracketInfo, calcTax → lib/logic.js

function derivedTax(){
  const t=STATE.tax;
  return {...t, rmf:+t.rmfBought||0, thaiesg:+t.esgBought||0};
}

// ── API ──
async function apiLoad(profile){
  const r=await fetch(`${API_URL}?profile=${profile}`);
  const j=await r.json();
  if(!j.ok) throw new Error(j.error||"load failed");
  return j.data;
}
async function apiSave(sheet,profile,rows){
  const r=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},
    body:JSON.stringify({sheet,profile,rows})});
  const j=await r.json().catch(()=>({}));
  if(j.ok===false) throw new Error(j.error||"save failed");
}

function toast(msg,color="var(--green)"){
  const t=document.createElement("div"); t.className="toast"; t.textContent=msg;
  t.style.borderColor=color; t.style.color=color; document.body.appendChild(t);
  setTimeout(()=>t.remove(),2000);
}

// ── load profile data ──
async function loadProfile(profile){
  STATE.profile=profile;
  render(true); // show loading
  try{
    const data = await apiLoad(profile);
    if(data.assets && data.assets.length){
      STATE.assets = data.assets.map(a=>({...a,value:+a.value||0,plan:+a.plan||0}));
      STATE._pvdMonthly = STATE.assets.filter(a=>a.bucket==='PVD').reduce((s,a)=>s+(+a.plan||0),0);
      // pvd_pct ไม่ถูก save โดย Apps Script — derive กลับจาก plan amounts
      if(STATE._pvdMonthly>0){
        STATE.assets=STATE.assets.map(a=>
          a.bucket==='PVD'&&!(+a.pvd_pct)
            ?{...a,pvd_pct:Math.round((+a.plan||0)/STATE._pvdMonthly*100)}
            :a
        );
      }
    } else {
      STATE.assets = []; // ว่าง — ให้กดโหลด seed
    }
    // backend อาจคืน tax เป็น array [{...}] (เก่า) หรือ object {...} (JSON-store ใหม่) — รองรับทั้งคู่
    const taxRow = Array.isArray(data.tax) ? data.tax[0] : data.tax;
    STATE.tax = (taxRow && Object.keys(taxRow).length) ? coerceTax(taxRow) : STATE.tax;
    STATE.snapshots = (data.snapshots||[]).map(s=>({...s,total:+s.total||0,
      breakdown: typeof s.breakdown==="string"?safeParse(s.breakdown):(s.breakdown||{})}));
  }catch(e){
    STATE._error = String(e);
  }
  render();
}
// safeParse, coerceTax → lib/logic.js

async function syncSeedPlans(){
  const snap=snapState();
  const seedAssets=(SEED[STATE.profile]?.assets||[]);
  const seedMap=Object.fromEntries(seedAssets.map(a=>[a.id,a.plan]));
  const existingIds=new Set(STATE.assets.map(a=>a.id));
  STATE.assets=STATE.assets.map(a=>({...a,plan:seedMap[a.id]??a.plan}));
  seedAssets.forEach(sa=>{ if(!existingIds.has(sa.id)) STATE.assets.push({...sa}); });
  render();
  try{await apiSave("assets",STATE.profile,STATE.assets);toast("อัปเดตแผน DCA แล้ว ✓");}
  catch(e){rollback(snap);toast("บันทึกไม่ได้ — ย้อนกลับแล้ว","var(--red)");}
}
function loadSeed(){
  if(!confirm(`โหลด seed ของ ${STATE.profile==="fern"?"เฟิร์น":"นัท"} จะทับข้อมูลปัจจุบันทั้งหมด ยืนยันไหม?`)) return;
  const s=SEED[STATE.profile];
  STATE.assets=s.assets.map(a=>({...a}));
  STATE.tax={...s.tax};
  render();
  toast("โหลด seed แล้ว — กดบันทึกเพื่อเก็บลง Sheet");
}

function setPlan(id,v){
  const a=STATE.assets.find(x=>x.id===id); if(!a)return;
  if(!setPlan._t) setPlan._snap=snapState();
  a.plan=num(v);
  if(a.plan>0) delete a._isEditingDca;
  const totalEl=document.getElementById('dca-monthly-total');
  if(totalEl) totalEl.textContent=baht(STATE.assets.reduce((s,x)=>x.bucket!=='PVD'?(s+(+x.plan||0)):s,0));
  renderDcaImpact();
  clearTimeout(setPlan._t);
  setPlan._t=setTimeout(async()=>{
    setPlan._t=null;
    const snap=setPlan._snap; setPlan._snap=null;
    const btn=document.getElementById('dca-save-btn');
    btnLoading(btn,true);
    try{await apiSave("assets",STATE.profile,STATE.assets);toast("บันทึกแผนแล้ว ✓");}
    catch(e){rollback(snap);toast("บันทึกไม่ได้ — ย้อนกลับแล้ว","var(--red)");}
    finally{btnLoading(btn,false);}
  },1200);
}
// คำนวณยอด PVD ใหม่จาก % + อัปเดต DOM สด ๆ (ไม่ autosave — กดบันทึกเอง)
function recalcPvd(){
  const tot=+STATE._pvdMonthly||0;
  let pctSum=0;
  STATE.assets.forEach(a=>{
    if(a.bucket!=='PVD')return;
    a.plan=Math.round(tot*(+a.pvd_pct||0)/100);
    pctSum+=(+a.pvd_pct||0);
    const cell=document.getElementById('pvd-amt-'+a.id);
    if(cell)cell.textContent=baht(a.plan);
  });
  const ok=Math.abs(pctSum-100)<0.05, pctShow=+pctSum.toFixed(1), pctGap=+Math.abs(100-pctSum).toFixed(1);
  const sumEl=document.getElementById('pvd-sum');
  if(sumEl){
    sumEl.textContent=ok?`รวม ${pctShow}% ✓`
      :`รวม ${pctShow}% — ${pctSum<100?'ขาดอีก '+pctGap:'เกินมา '+pctGap}% (ต้องรวมเป็น 100)`;
    sumEl.style.color=ok?'var(--green)':'var(--red)';
  }
  const btn=document.getElementById('pvd-save-btn');
  if(btn){btn.disabled=!ok;btn.style.opacity=ok?'1':'.45';btn.style.cursor=ok?'pointer':'not-allowed';}
  renderDcaImpact();
}
function setPvdTotal(v){ STATE._pvdMonthly=num(v); recalcPvd(); }
function setPvdPct(id,v){
  const a=STATE.assets.find(x=>x.id===id); if(a)a.pvd_pct=num(v);
  recalcPvd();
}
// บันทึก PVD เอง — สัดส่วน % ต้องรวมเป็น 100 พอดี
async function savePvd(){
  const pctSum=STATE.assets.filter(a=>a.bucket==='PVD').reduce((s,a)=>s+(+a.pvd_pct||0),0);
  if(Math.abs(pctSum-100)>=0.05){toast(`สัดส่วน % ต้องรวมเป็น 100 พอดี (ตอนนี้ ${+pctSum.toFixed(1)}%)`,"var(--red)");return;}
  const snap=snapState();
  const btn=document.getElementById('pvd-save-btn');
  btnLoading(btn,true);
  try{await apiSave("assets",STATE.profile,STATE.assets);toast("บันทึก PVD แล้ว ✓");}
  catch(e){rollback(snap);toast("บันทึกไม่ได้ — ย้อนกลับแล้ว","var(--red)");}
  finally{btnLoading(btn,false);recalcPvd();}
}
function toggleDcaAddForm(){
  STATE._dcaAddForm = STATE._dcaAddForm ? null
    : {name:'', asset_class:'dm_core', bucket:'', plan:0};
  renderTab();
}
function commitDcaNewFund(){
  const f=STATE._dcaAddForm; if(!f) return;
  if(!f.name.trim()){toast("ใส่ชื่อกองก่อน","var(--red)");return;}
  if(!f.bucket.trim()){toast("ใส่ชื่อกระเป๋าด้วย","var(--red)");return;}
  if(!(f.plan>0)){toast("ใส่จำนวน DCA/เดือนก่อน","var(--red)");return;}
  const newAsset={
    id:'d'+Date.now().toString(36),
    name:f.name.trim(), asset_class:f.asset_class,
    bucket:f.bucket.trim(), value:0, plan:+f.plan
  };
  const snap=snapState();
  STATE.assets.push(newAsset);
  STATE._dcaAddForm=null;
  renderTab();
  apiSave("assets",STATE.profile,STATE.assets)
    .then(()=>toast("เพิ่มกอง DCA แล้ว ✓"))

function setTaxLive(k,v){
  const n=num(v);
  const active=document.activeElement;
  const inp=document.getElementById('tax-input-'+k);
  const sli=document.getElementById('tax-slider-'+k);
  if(inp&&inp!==active) inp.value=n||0;

  _applyTaxChange(k,n);
}

function _applyTaxChange(k,n){
  // Capture state before the first keystroke of a new debounce cycle
  if(!_taxTimer) _taxSaveSnap=snapState();
  STATE.tax[k]=n;
  const dt=derivedTax();
  const inc=+dt.income||0;
  // Dynamic slider maxes
  const rmfSli=document.getElementById('tax-slider-rmfBought');
  const esgSli=document.getElementById('tax-slider-esgBought');
  if(rmfSli){const mx=Math.floor(Math.min(inc*.30,500000)/1000)*1000;rmfSli.max=mx;}
  if(esgSli){const mx=Math.floor(Math.min(inc*.30,300000)/1000)*1000;esgSli.max=mx;}
  updateTaxSummary(calcTax(dt));
  clearTimeout(_taxTimer);
  _taxTimer=setTimeout(async()=>{
    _taxTimer=null;
    const snap=_taxSaveSnap; _taxSaveSnap=null;
    const btns=document.querySelectorAll('[onclick="saveTax()"]');
    btns.forEach(b=>btnLoading(b,true));
    try{await apiSave("tax",STATE.profile,[STATE.tax]);toast("บันทึกภาษีแล้ว ✓");}
    catch(e){rollback(snap);toast("บันทึกไม่สำเร็จ — ย้อนกลับแล้ว","var(--red)");}
    finally{btns.forEach(b=>btnLoading(b,false));}
  },1500);
}

function exportForClaude(){
  const t=total(),bc=byClass();
  const name=STATE.profile==='fern'?'เฟิร์น':'นัท';
  const now=new Date();
  const thM=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  const dateStr=`${now.getDate()} ${thM[now.getMonth()]} ${now.getFullYear()+543}`;
  const pvdA=STATE.assets.filter(a=>a.bucket==='PVD');
  const nonPvd=STATE.assets.filter(a=>a.bucket!=='PVD');
  const dcaTotal=nonPvd.reduce((s,a)=>s+(+a.plan||0),0);
  const pvdTotal=STATE._pvdMonthly||pvdA.reduce((s,a)=>s+(+a.plan||0),0);
  const months=STATE._dcaMonths||12;
  const tp=STATE.assets.reduce((s,a)=>s+(+a.plan||0),0);
  const projTotal=t+tp*months;
  const curBc={},dcaBc={};
  CK.forEach(k=>{curBc[k]=0;dcaBc[k]=0;});
  STATE.assets.forEach(a=>{
    curBc[a.asset_class]=(curBc[a.asset_class]||0)+(+a.value||0);
    if(+a.plan>0) dcaBc[a.asset_class]=(dcaBc[a.asset_class]||0)+(+a.plan||0);
  });
  let txt=`# พอร์ตลงทุน — ${name} | ${dateStr}\n\n`;
  txt+=`## ภาพรวม\n`;
  txt+=`มูลค่ารวม: ${baht(t)}\n\n`;
  txt+=`## Asset Allocation (ปัจจุบัน vs เป้าหมาย)\n`;
  txt+=`ประเภท | มูลค่า | % จริง | % เป้า | ส่วนต่าง\n`;
  txt+=`--- | --- | --- | --- | ---\n`;
  CK.forEach(k=>{
    const c=cls(k);
    if(c.target===0&&!(bc[k]>0)) return;
    const pct=t?((bc[k]||0)/t*100):0;
    const diff=pct-c.target;
    txt+=`${c.label} | ${baht(bc[k]||0)} | ${pct.toFixed(1)}% | ${c.target}% | ${diff>=0?'+':''}${diff.toFixed(1)}%\n`;
  });
  txt+=`\n## แผน DCA กองทุน (${baht(dcaTotal)}/เดือน)\n`;
  nonPvd.filter(a=>+a.plan>0).forEach(a=>{
    txt+=`- ${a.name} [${CLASSES[a.asset_class].label}]: ${baht(a.plan)}\n`;
  });
  if(pvdA.length){
    txt+=`\n## PVD สมทบ (${baht(pvdTotal)}/เดือน)\n`;
    pvdA.forEach(a=>{
      txt+=`- ${a.name} [${CLASSES[a.asset_class].label}, ${+a.pvd_pct||0}%]: ${baht(+a.plan||0)}\n`;
    });
  }
  txt+=`\n## Projection +${months} เดือน (DCA รวม PVD ${baht(tp)}/ด.)\n`;
  txt+=`ประเภท | ตอนนี้ | +${months}ด. | เป้า\n`;
  txt+=`--- | --- | --- | ---\n`;
  CK.forEach(k=>{
    const c=cls(k);
    if(c.target===0&&!curBc[k]&&!dcaBc[k]) return;
    const curPct=t?(curBc[k]||0)/t*100:0;
    const projPct=projTotal?((curBc[k]||0)+(dcaBc[k]||0)*months)/projTotal*100:0;
    txt+=`${c.label} | ${curPct.toFixed(1)}% | ${projPct.toFixed(1)}% | ${c.target}%\n`;
  });
  navigator.clipboard.writeText(txt).then(()=>toast('คัดลอกแล้ว — วางใน Claude chat ได้เลย ✓'));
}
