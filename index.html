// ── จำนวนงวด DCA ที่เหลือในปีนี้ (งวดถัดไป → ธ.ค.) ตัดวันที่ 5 ──
function remainingMonths(dcaDay=5){
  const d=new Date(), mo=d.getMonth()+1, day=d.getDate();
  let next = day < dcaDay ? mo : mo+1;   // ถ้ายังไม่ถึงวันตัด งวดเดือนนี้ยังนับ
  if(next>12) return 0;
  return 12 - next + 1;                  // งวด next..ธ.ค.
}

// ╔═══ Tax Engine 2569 ═══╗
// คำนวณว่าต้องลดหย่อนเพิ่มเท่าไรเพื่อลดขั้นภาษี + ประหยัดเท่าไร
function bracketInfo(net, marginal){
  const EDGES=[150000,300000,500000,750000,1000000,2000000,5000000];
  const RATES=[0,.05,.10,.15,.20,.25,.30,.35];
  // หาขอบล่างของขั้นปัจจุบัน
  let lower=0;
  for(const e of EDGES){ if(net>e) lower=e; else break; }
  const need=net-lower; // ลดหย่อนเท่านี้ → ตกไปขั้นล่าง
  // อัตราขั้นล่างถัดไป
  const idx=EDGES.indexOf(lower);
  const lowerRate=idx>=0?RATES[idx]:0;
  const saving=Math.round(need*marginal); // ประหยัดจากส่วนที่ตกขั้น
  return {need:Math.max(need,0), curRate:marginal, lowerRate, saving, atBottom:net<=150000};
}

function calcTax(s){
  const inc=+s.income||0;
  const exp=Math.min(inc*0.5,100000);
  const fam=60000+(s.spouse?60000:0)+Math.min(+s.parents||0,4)*30000
    +(+s.children||0)*30000+(+s.children2nd||0)*60000+Math.min(+s.parentsHealth||0,15000)+(+s.ss||0);
  const hlth=Math.min(+s.healthInsurance||0,25000);
  const ins=Math.min((+s.lifeInsurance||0)+hlth,100000);
  const pen=Math.min(+s.pension||0,inc*0.15,200000);
  const rmf=Math.min(+s.rmf||0,inc*0.30,500000);
  const pvd=+s.pvd||0, ssf=Math.min(+s.ssf||0,inc*0.30,200000);
  const retSum=rmf+pvd+ssf+pen, ret=Math.min(retSum,500000);
  const esg=Math.min(+s.thaiesg||0,inc*0.30,300000);
  const home=Math.min(+s.homeLoan||0,100000);
  const sumD=exp+fam+ins+ret+esg+home;
  const netBD=Math.max(inc-sumD,0);
  const don=Math.min(+s.donation||0,netBD*0.10);
  const net=Math.max(netBD-don,0);
  const B=[[150000,0],[150000,.05],[200000,.10],[250000,.15],[250000,.20],[1000000,.25],[3000000,.30],[Infinity,.35]];
  let tax=0,rem=net,mg=0;
  for(const[b,r]of B){if(rem<=0)break;const c=Math.min(rem,b);tax+=c*r;rem-=c;if(c>0)mg=r;}
  const wht=+s.wht||0, tp=Math.round(tax);
  return {exp,fam,ins,ret,esg,home,don,retSum,net,taxPayable:tp,wht,refund:Math.round(wht-tp),marginal:mg,
    allowedRMF:rmf,
    rmfRoom:Math.max(Math.min(inc*0.30,500000-pvd-ssf-pen)-(+s.rmf||0),0),
    esgRoom:Math.max(Math.min(inc*0.30,300000)-esg,0),
    retireRoom:Math.max(500000-retSum,0)};
}

function derivedTax(){
  const t=STATE.tax;
  return {...t, rmf:+t.rmfBought||0, thaiesg:+t.esgBought||0};

// ── API ──
async function apiLoad(profile){
  const r=await fetch(`${API_URL}?profile=${profile}`);
  const j=await r.json();
  if(!j.ok) throw new Error(j.error||"load failed");
  return j.data;
}
async function apiSave(sheet,profile,rows){
  const r=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},
    body:JSON.stringify({sheet,profile,rows})});
  const j=await r.json().catch(()=>({}));
  if(j.ok===false) throw new Error(j.error||"save failed");
}

function toast(msg,color="var(--green)"){
  const t=document.createElement("div"); t.className="toast"; t.textContent=msg;
  t.style.borderColor=color; t.style.color=color; document.body.appendChild(t);
  setTimeout(()=>t.remove(),2000);
}

// ── load profile data ──
async function loadProfile(profile){
  STATE.profile=profile;
  render(true); // show loading
  try{
    const data = await apiLoad(profile);
    if(data.assets && data.assets.length){
      STATE.assets = data.assets.map(a=>({...a,value:+a.value||0,plan:+a.plan||0}));
    } else {
      STATE.assets = []; // ว่าง — ให้กดโหลด seed
    }
    STATE.tax = (data.tax && data.tax[0]) ? coerceTax(data.tax[0]) : {};
    STATE.snapshots = (data.snapshots||[]).map(s=>({...s,total:+s.total||0,
      breakdown: typeof s.breakdown==="string"?safeParse(s.breakdown):(s.breakdown||{})}));
  }catch(e){
    STATE._error = String(e);
  }
  render();
}
function safeParse(s){try{return JSON.parse(s)}catch{return {}}}
function coerceTax(o){
  const out={...o};
  // migration: เลขเก่า = "ซื้อปีนี้ครึ่งแรก" → ย้ายเข้า bought
  if(out.rmfBought===undefined && out.rmfHistorical!==undefined) out.rmfBought=out.rmfHistorical;
  if(out.esgBought===undefined && out.esgHistorical!==undefined) out.esgBought=out.esgHistorical;
  ["income","wht","ss","pvd","parents","children","children2nd","parentsHealth",
   "lifeInsurance","healthInsurance","pension","ssf","homeLoan","donation",
   "rmfBought","esgBought"].forEach(k=>out[k]=+out[k]||0);
  out.spouse=+out.spouse?1:0;
  return out;
}

function byClass(){const m={};CK.forEach(k=>m[k]=0);STATE.assets.forEach(a=>m[a.asset_class]=(m[a.asset_class]||0)+(+a.value||0));return m;}

function buckets(){return [...new Set(STATE.assets.map(a=>a.bucket))];}

function alerts(){
  const out=[],t=total(),bc=byClass();
  CK.forEach(k=>{
    const pct=t?bc[k]/t*100:0, tgt=CLASSES[k].target, d=pct-tgt;
    if(k==="thai_equity"&&d>5)out.push({w:1,t:`หุ้นไทย ${pct.toFixed(1)}% เกินเป้า ${tgt}% — หยุดเติม ปล่อย DCA เจือจาง`});
    if(k==="gold"&&d<-3)out.push({w:0,t:`ทองคำ ${pct.toFixed(1)}% ต่ำกว่าเป้า ${tgt}% — DCA ต่อ`});
    if(k==="dm_tech"){const c=CLASSES[k].ceiling;if(pct>c)out.push({w:1,t:`Tech ${pct.toFixed(1)}% เกิน ceiling ${c}%`});
      else if(pct>c-2)out.push({w:0,t:`Tech ${pct.toFixed(1)}% ใกล้ ceiling ${c}%`});}
    if(k==="dm_core"&&d<-5)out.push({w:0,t:`หุ้นกระจาย ${pct.toFixed(1)}% ต่ำกว่าเป้า ${tgt}%`});
    if(k==="em_china"){const c=CLASSES[k].ceiling;if(pct>c)out.push({w:1,t:`จีน ${pct.toFixed(1)}% เกิน ceiling ${c}% — tactical เท่านั้น`});}
    if(k==="em_growth"&&d<-3)out.push({w:0,t:`EM โต ${pct.toFixed(1)}% ต่ำกว่าเป้า ${tgt}% — เติมได้`});
  });
  const dt=derivedTax(), ru=(+dt.rmf||0)+(+dt.pvd||0)+(+dt.ssf||0)+(+dt.pension||0);
  if(ru/500000>0.9)out.push({w:1,t:`กลุ่มเกษียณใช้ไป ${(ru/500000*100).toFixed(0)}% ของ 500k — ใกล้เต็ม`});
  return out;
}

<span class="muted" style="font-size:12px">มูลค่าพอร์ตรวม</span>
<span class="tnum muted" style="font-size:13px">${baht(portVal)}</span></div>
<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0">
<span style="font-size:12px">ซื้อแล้วปีนี้ (YTD)</span>
<input class="num" type="text" inputmode="numeric" value="${boughtVal}" oninput="setTax('${boughtKey}',this.value)" style="width:110px;padding:5px 8px;font-size:13px"></div>
<div style="display:flex;justify-content:space-between;padding:6px 0">
<span class="muted" style="font-size:12px">แผน DCA ที่เหลือ</span>
<span class="tnum muted" style="font-size:13px">${future} เดือน × ${baht(monthly)} = ${baht(futureAmt)}</span></div>
<div style="display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--line);margin-top:6px;padding-top:10px">
<span style="font-size:13px;font-weight:600">รวมลดหย่อนปีนี้</span>
<span class="gold tnum" style="font-size:18px;font-weight:700">${baht(totalD)}</span></div></div>`;
}
function taxRow(k,label,ro){const v=STATE.tax[k]??0;return `<div class="arow"><div style="flex:1"><div style="font-size:14px">${label}</div></div>${ro?`<span class="gold tnum" style="font-weight:600">${baht(v)}</span>`:`<input class="num" type="text" inputmode="numeric" value="${v}" oninput="setTax('${k}',this.value)">`}</div>`;}
function taxBool(k,label){const on=+STATE.tax[k]?1:0;return `<div class="arow"><div style="font-size:14px">${label}</div><button onclick="toggleTaxBool('${k}')" style="background:${on?'var(--gold)':'var(--line)'};color:${on?'var(--ink)':'var(--mute)'};border:none;border-radius:20px;padding:6px 18px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">${on?'มี ✓':'ไม่มี'}</button></div>`;}
function accHead(k,label,badge){return `<button class="acc" onclick="toggleAcc('${k}')"><span style="font-size:14px;font-weight:600">${label}</span><span style="display:flex;align-items:center;gap:10px">${badge?`<span class="muted" style="font-size:12px">${badge}</span>`:""}<span class="gold" style="font-size:12px">${STATE.accOpen[k]?"▲":"▼"}</span></span></button>`;}

// ── handlers ──
function switchProfile(p){if(p!==STATE.profile){STATE.editing=false;STATE._error=null;loadProfile(p);}}
function go(t){STATE.tab=t;
  // อัปเดตปุ่มแท็บ active โดยไม่วาดทั้งหน้า (กัน focus หลุด)
  document.querySelectorAll("nav .tab").forEach(b=>b.classList.remove("on"));
  const tabs=["overview","update","dca","growth","tax"];
  const btn=document.querySelectorAll("nav .tab")[tabs.indexOf(t)];
  if(btn)btn.classList.add("on");
  renderTab();
}
function toggleEdit(){STATE.editing=true;render();}
function setVal(id,v){const a=STATE.assets.find(x=>x.id===id);if(a)a.value=num(v);
  const tot=document.querySelector("header .total");if(tot)tot.textContent=baht(total());
  const tot2=$(".gold.tnum");if(tot2)tot2.textContent=baht(total());}
let _taxTimer=null;
function setTax(k,v){
  STATE.tax[k]=num(v);
  clearTimeout(_taxTimer);
  _taxTimer=setTimeout(saveTax,1500);
}
function recomputeTax(){renderTab();} // กดปุ่มเพื่อคำนวณใหม่
function toggleTaxBool(k){STATE.tax[k]=+STATE.tax[k]?0:1;renderTab();}
function toggleAcc(k){STATE.accOpen[k]=!STATE.accOpen[k];renderTab();}

async function saveAll(){
  STATE.editing=false;
  try{
    await apiSave("assets",STATE.profile,STATE.assets);
    // snapshot
    const mk=()=>{const d=new Date();const th=["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];return th[d.getMonth()]+" "+((d.getFullYear()+543)%100);};
    const bc=byClass();const snap={month:mk(),total:total(),breakdown:JSON.stringify(bc)};
    STATE.snapshots=[...STATE.snapshots.filter(s=>s.month!==snap.month),snap];
    await apiSave("snapshots",STATE.profile,STATE.snapshots);
    toast("บันทึกแล้ว ✓");
  }catch(e){toast("บันทึกไม่สำเร็จ",( "var(--red)"));}
  render();
}
async function saveTax(){
  try{await apiSave("tax",STATE.profile,[STATE.tax]);toast("บันทึกภาษีแล้ว ✓");}
  catch(e){toast("บันทึกไม่สำเร็จ","var(--red)");}
}

// ── init ──
if(API_URL==="PASTE_YOUR_APPS_SCRIPT_URL_HERE"){
  $("#app").innerHTML=`<div class="center"><div class="card" style="max-width:420px"><div class="gold" style="font-size:15px;margin-bottom:10px">⚙️ ยังไม่ได้ตั้งค่า</div><div class="muted" style="font-size:13px;line-height:1.7">เปิดไฟล์นี้แก้บรรทัด <span class="gold">API_URL</span> ด้านบนสุดของ &lt;script&gt; ให้เป็น URL ของ Apps Script Web App (จาก Phase 1) แล้วเซฟ เปิดใหม่อีกครั้ง</div></div></div>`;
}else{
  loadProfile("fern");
}
</script>
</body>
</html>
